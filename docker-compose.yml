version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: smart-portal-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: smart_portal_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: smart-portal-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: adminpassword
    ports:
      - "5050:80"
    depends_on:
      - db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smart-portal-backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://postgres:postgrespassword@db:5432/smart_portal_db?schema=public
      - PORT=5001
      - NODE_ENV=production
      - JWT_ACCESS_SECRET=your_jwt_access_secret_key_12345!
      - JWT_REFRESH_SECRET=your_jwt_refresh_secret_key_67890!
      - CLOUDINARY_CLOUD_NAME=your_cloud_name
      - CLOUDINARY_API_KEY=your_api_key
      - CLOUDINARY_API_SECRET=your_api_secret
    ports:
      - "5001:5001"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smart-portal-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5001/api
    depends_on:
      - backend

volumes:
  pgdata:
